<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Beans Café</title>
    <link rel="shortcut icon" href="./img/logo.jpg" type="image/x-icon">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/main.css">

    <style>
        .auth-container {
            min-height: 100vh;
            /* Đồng bộ background với register */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('./img/banner.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 420px;
            width: 100%;
            margin: 0 auto;
        }
        /* Đồng bộ kích thước logo 150px như register */
        .logo-auth {
            max-width: 150px;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="container">
        <div class="auth-card p-5 mx-auto">
            <div class="text-center mb-4">
                <img src="./img/logo.jpg" alt="Beans Café" class="logo-auth mb-3">
                <h3 class="text-primary fw-bold">Đăng Nhập</h3>
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Tên đăng nhập</label>
                    <input type="text" id="username" class="form-control" placeholder="Nhập tên đăng nhập" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu" required>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label" for="remember">Ghi nhớ tôi</label>
                    </div>
                    <a href="#" class="text-primary text-decoration-none small">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-3 fw-bold rounded-pill">
                    ĐĂNG NHẬP
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="mb-0">Chưa có tài khoản? 
                    <a href="./register.html" class="text-primary fw-semibold text-decoration-none">Đăng ký ngay</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script src="./js/auth.js"></script>
<script>
    // Chỉ cần dòng này là đủ
    document.getElementById('loginForm').addEventListener('submit', handleLogin);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
