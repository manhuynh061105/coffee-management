<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - Beans Café</title>
    <link rel="shortcut icon" href="./img/logo.jpg" type="image/x-icon">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Main CSS -->
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/index.css">

    <style>
        .auth-container {
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('../img/banner.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 460px;
            width: 100%;
            margin: 0 auto;
        }
        .logo-auth {
            max-width: 180px;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="container">
        <div class="auth-card p-5 mx-auto">
            <div class="text-center mb-4">
                <img src="./img/logo.jpg" alt="Beans Café" class="logo-auth mb-3">
                <h3 class="text-primary fw-bold">Beans Café</h3>
                <p class="text-muted">Tạo tài khoản mới</p>
            </div>

            <form>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Họ và tên</label>
                        <input type="text" class="form-control form-control-lg" placeholder="Nguyễn Văn A" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Số điện thoại</label>
                        <input type="tel" class="form-control form-control-lg" placeholder="070 446 7304" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control form-control-lg" placeholder="example@gmail.com" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" class="form-control form-control-lg" placeholder="Nhập mật khẩu" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Xác nhận mật khẩu</label>
                    <input type="password" class="form-control form-control-lg" placeholder="Nhập lại mật khẩu" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-3 fw-bold rounded-pill">
                    ĐĂNG KÝ
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="mb-0">Đã có tài khoản? 
                    <a href="./login.html" class="text-primary fw-semibold text-decoration-none">Đăng nhập</a>
                </p>
            </div>

            <hr class="my-4">

            <div class="text-center">
                <button class="btn btn-outline-secondary w-100 mb-2">
                    <i class="fab fa-google me-2"></i> Đăng ký bằng Google
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
