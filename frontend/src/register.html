<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - Beans Café</title>
    <link rel="shortcut icon" href="./img/logo.jpg" type="image/x-icon">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/main.css">

    <style>
        .auth-container {
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('./img/banner.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 420px;
            width: 100%;
            margin: 0 auto;
        }
        .logo-auth {
            max-width: 150px;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="container">
        <div class="auth-card p-5 mx-auto">
            <div class="text-center mb-4">
                <img src="./img/logo.jpg" alt="Beans Café" class="logo-auth mb-3">
                <h3 class="text-primary fw-bold">Đăng Ký Tài Khoản</h3>
            </div>

            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label">Tên đăng nhập</label>
                    <input type="text" id="username" class="form-control" placeholder="Nhập tên đăng nhập" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" id="password" class="form-control" placeholder="Ít nhất 6 ký tự" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Xác nhận mật khẩu</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="Nhập lại mật khẩu" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-3 fw-bold rounded-pill">
                    ĐĂNG KÝ NGAY
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="mb-0">Đã có tài khoản? 
                    <a href="./login.html" class="text-primary fw-semibold text-decoration-none">Đăng nhập</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script src="./js/auth.js"></script>
<script>
    // Chỉ cần dòng này, vì logic so khớp pass thầy đã đưa vào auth.js ở trên
    document.getElementById('registerForm').addEventListener('submit', handleRegister);
</script>

</body>
</html>
